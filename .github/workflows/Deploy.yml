name: Build and Release Android App

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Dependencies and Prebuild
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
          npm install expo --legacy-peer-deps
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Configure Clean Application Entry Target
        run: |
          node -e "
            const fs = require('fs');
            const candidates = ['./App.js', './App.tsx', './app.js', './app.tsx', './src/App.js', './src/App.tsx'];
            let foundTarget = './App';
            
            for (const file of candidates) {
              if (fs.existsSync(file)) {
                foundTarget = file.replace(/\.(js|tsx|ts)$/, '');
                console.log('Target bundle source identified:', foundTarget);
                break;
              }
            }
            
            const entryCode = \`import { registerRootComponent } from 'expo';\nimport App from '\${foundTarget}';\nregisterRootComponent(App);\`;
            fs.writeFileSync('index.js', entryCode);
            
            if (fs.existsSync('package.json')) {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.main = 'index.js';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            }
          "

      - name: Install Native Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Pre-bundle JavaScript Assets (Expo Native)
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build Signed Standalone APK Package
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          NODE_ENV: production

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-release-apk
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
